name: CD

on:
  push:
    branches: [main]

jobs:
  ci-check:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI checks to pass
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Biome · Type Check · Tests"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

  build-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    needs: ci-check
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
            image: ghcr.io/jarvis-jupiter/book-explorer-api
          - service: web
            dockerfile: apps/web/Dockerfile
            image: ghcr.io/jarvis-jupiter/book-explorer-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-push

    strategy:
      matrix:
        include:
          - service: api
            service_id_secret: RAILWAY_API_SERVICE_ID
            image: ghcr.io/jarvis-jupiter/book-explorer-api
          - service: web
            service_id_secret: RAILWAY_WEB_SERVICE_ID
            image: ghcr.io/jarvis-jupiter/book-explorer-web

    steps:
      - name: Update Railway service image & redeploy
        run: |
          # Update service source to the new image tag
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceUpdate(serviceId: \"${{ secrets[matrix.service_id_secret] }}\", environmentId: \"${{ secrets.RAILWAY_ENV_ID }}\", input: { source: { image: \"${{ matrix.image }}:${{ github.sha }}\" } }) }"
            }'

          # Trigger redeploy
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceRedeploy(serviceId: \"${{ secrets[matrix.service_id_secret] }}\", environmentId: \"${{ secrets.RAILWAY_ENV_ID }}\") }"
            }'
