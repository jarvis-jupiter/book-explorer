name: CD

on:
  push:
    branches: [main]

jobs:
  ci-check:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI checks to pass
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Biome · Type Check · Tests"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

  build-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    needs: ci-check
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
            image: ghcr.io/jarvis-jupiter/book-explorer-api
          - service: web
            dockerfile: apps/web/Dockerfile
            image: ghcr.io/jarvis-jupiter/book-explorer-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Update image & redeploy
        run: |
          curl -sf https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceUpdate(serviceId: \"${{ secrets.RAILWAY_API_SERVICE_ID }}\", environmentId: \"${{ secrets.RAILWAY_ENV_ID }}\", input: { source: { image: \"ghcr.io/jarvis-jupiter/book-explorer-api:${{ github.sha }}\" } }) }"}'

          curl -sf https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceRedeploy(serviceId: \"${{ secrets.RAILWAY_API_SERVICE_ID }}\", environmentId: \"${{ secrets.RAILWAY_ENV_ID }}\") }"}'

  deploy-web:
    name: Deploy Web → Railway
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Update image & redeploy
        run: |
          curl -sf https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceUpdate(serviceId: \"${{ secrets.RAILWAY_WEB_SERVICE_ID }}\", environmentId: \"${{ secrets.RAILWAY_ENV_ID }}\", input: { source: { image: \"ghcr.io/jarvis-jupiter/book-explorer-web:${{ github.sha }}\" } }) }"}'

          curl -sf https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceRedeploy(serviceId: \"${{ secrets.RAILWAY_WEB_SERVICE_ID }}\", environmentId: \"${{ secrets.RAILWAY_ENV_ID }}\") }"}'
