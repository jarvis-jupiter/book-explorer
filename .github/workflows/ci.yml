name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Biome · Type Check · Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: book_explorer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/book_explorer_test
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @book-explorer/db db:generate

      - name: Biome — lint & format check
        run: pnpm biome check --no-errors-on-unmatched .

      - name: Type check
        run: pnpm turbo typecheck

      - name: Run database migrations
        run: pnpm --filter @book-explorer/db db:migrate

      - name: Run tests
        run: pnpm turbo test

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: ci

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: book_explorer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/book_explorer_test
      GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
      # Clerk placeholder keys — allow the web server to start (auth will redirect in tests)
      CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      CLERK_SECRET_KEY: sk_test_placeholder
      API_BASE_URL: http://localhost:3001
      WEB_BASE_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @book-explorer/db db:generate

      - name: Run database migrations
        run: pnpm --filter @book-explorer/db db:migrate

      - name: Install Playwright browsers
        run: pnpm --filter @book-explorer/e2e exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm --filter @book-explorer/e2e e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 14
