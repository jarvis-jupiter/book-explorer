name: book-explorer

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: book_explorer_e2e
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d book_explorer_e2e"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Not exposed to host — only the api service needs it

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/book_explorer_e2e
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-test-jwt-secret-please-change-in-production}
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: test
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      # SSR (Remix loaders) talks to api over the Docker bridge network
      API_BASE_URL: http://api:3001
      PORT: "3000"
      SESSION_SECRET: ${SESSION_SECRET:-test-session-secret-please-change-in-production}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
